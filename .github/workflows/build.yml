name: Build

on:
  push:
    branches: [master, v1.1-beta, v1.2-beta, integration/all-versions-port]
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: mc1_21_0_to_1_21_4
            mc_range: "1.21.0-1.21.4"
            build_file: build-mc1.21.0-1.21.4.gradle
            java: "21"
            libs_dir: build/mc1_21_0_to_1_21_4/libs
          - profile: mc1_21_5
            mc_range: "1.21.5"
            build_file: build-mc1.21.5.gradle
            java: "21"
            libs_dir: build/mc1_21_5/libs
          - profile: mc1_21_6_to_1_21_8
            mc_range: "1.21.6-1.21.8"
            build_file: build-mc1.21.6-1.21.8.gradle
            java: "21"
            libs_dir: build/mc1_21_6_to_1_21_8/libs
          - profile: mc1_21_9_to_1_21_11
            mc_range: "1.21.9-1.21.11"
            build_file: build-mc1.21.9-1.21.11.gradle
            java: "21"
            libs_dir: build/mc1_21_9_to_1_21_11/libs
          - profile: mc26_1
            mc_range: "26.1"
            build_file: build-mc26.1.gradle
            java: "25"
            libs_dir: build/mc26_1/libs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build ${{ matrix.profile }}
        run: ./gradlew "-PprofileBuild=${{ matrix.build_file }}" build

      - name: Find JAR
        run: |
          JAR=$(find "${{ matrix.libs_dir }}" -maxdepth 1 -name 'resourcetracker-*.jar' \
            ! -name '*-sources.jar' ! -name '*-dev.jar' | head -1)
          test -n "$JAR"
          echo "JAR_PATH=$JAR" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resourcetracker-mc${{ matrix.mc_range }}
          path: ${{ env.JAR_PATH }}
          if-no-files-found: error

  attach-to-release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach JARs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.jar
